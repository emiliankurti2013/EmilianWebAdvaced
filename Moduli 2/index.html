<!DOCTYPE html>

<html>
    <head>
        <title>Paragraphs</title>
    </head>

    <body>
        <!--Ketu jane tagjet-->>
        <p><b>Neser une kam test <del>permbledhes ne Kimi</del></b></p>
        <p><i><small>Per test une</small> nuk po stresohem<sub>Shume jam nervoz</sub></i></p>
        <p><strong><mark>Pas dy jave</mark> une e perfundoj klasen e 7-te<sup>Me ne fund</sup></strong>

        <!--Ketu kam paraqitur adresen-->>
        <address>Rr. Radovan Zogoviq C3 A4</address>
        <hr>
        <blockquote> Kosovo is a very beautiful country </blockquote>

        <qoute>Emilian Kurti :"Pa punë nuk ka talent"

        <p>Ky eshte fundi i klases se 7-te</p><cite>- Emilian Kurti</cite>
    </body>
</html>
